services:
  spark-master:
    image: apache/spark:3.5.0-python3
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - SPARK_HOME=/opt/spark
      - SPARK_NO_DAEMONIZE=true
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./python:/app/python
      - ./scala:/app/scala
      - ./data:/app/data
    user: root

  spark-worker-1:
    image: apache/spark:3.5.0-python3
    container_name: spark-worker-1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_HOME=/opt/spark
      - SPARK_NO_DAEMONIZE=true
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    ports:
      - "8081:8081"
    volumes:
      - ./python:/app/python
      - ./scala:/app/scala
      - ./data:/app/data
    depends_on:
      - spark-master
    user: root

  spark-worker-2:
    image: apache/spark:3.5.0-python3
    container_name: spark-worker-2
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_HOME=/opt/spark
      - SPARK_NO_DAEMONIZE=true
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    ports:
      - "8082:8081"
    volumes:
      - ./python:/app/python
      - ./scala:/app/scala
      - ./data:/app/data
    depends_on:
      - spark-master
    user: root

  jupyter:
    image: apache/spark:3.5.0-python3
    container_name: jupyter
    command: bash -c "pip install notebook matplotlib --quiet && jupyter notebook --ip=0.0.0.0 --port=8888 --allow-root --no-browser --NotebookApp.token='' --NotebookApp.password=''"
    environment:
      - SPARK_HOME=/opt/spark
      - PYSPARK_PYTHON=python3
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/app/notebooks
      - ./data:/app/data
    working_dir: /app/notebooks
    depends_on:
      - spark-master
    user: root

  zeppelin:
    build:
      context: .
      dockerfile: Dockerfile.zeppelin
    container_name: zeppelin
    environment:
      - ZEPPELIN_ADDR=0.0.0.0
      - ZEPPELIN_PORT=8890
      - SPARK_HOME=/opt/spark
      - SPARK_MASTER=spark://spark-master:7077
      - PYSPARK_PYTHON=python3
      # Zeppelin 0.10.1 only officially supports up to Spark 3.3.
      # This flag disables the version guard so it works with Spark 3.5.
      - ZEPPELIN_SPARK_ENABLESUPPORTEDVERSIONCHECK=false
    ports:
      - "8890:8890"
    volumes:
      - ./zeppelin_notebooks:/opt/zeppelin/notebook
      - ./data:/app/data
      - ./python:/app/python
      - ./scala:/app/scala
    depends_on:
      - spark-master
    user: root
